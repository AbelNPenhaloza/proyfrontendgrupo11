@if (authService.isAuthenticated() && authService.isAdmin()) {
  <app-navbar></app-navbar>
} @else if (authService.isAuthenticated() && authService.isBarbero()) {
  <app-navbar-barbero></app-navbar-barbero>
} @else if (authService.isAuthenticated()) {
  <!-- NAVBAR PARA CLIENTES LOGUEADOS -->
  <nav class="navbar navbar-expand-lg navbar-cliente-brand">
    <div class="container-fluid px-3 d-flex justify-content-between align-items-center">
      <a class="navbar-brand fw-bold d-flex align-items-center" routerLink="/cliente/turnos">
        <i class="bi bi-scissors fs-4 me-2"></i> ✂ Barbería 11
      </a>
      <div class="d-flex align-items-center gap-3">
        <a class="nav-link text-uppercase" routerLink="/cliente/turnos" style="font-size: 0.9rem; letter-spacing: 1px;"><i class="bi bi-calendar-plus me-1"></i>Reservar</a>
        <a class="nav-link text-uppercase" routerLink="/perfil" style="font-size: 0.9rem; letter-spacing: 1px;"><i class="bi bi-person-circle me-1"></i>Perfil</a>
        <button class="btn btn-logout px-3 py-1 rounded-pill text-white fw-bold text-uppercase shadow-sm" (click)="logout()" style="font-size: 0.8rem;">
          <i class="bi bi-box-arrow-right me-1"></i>Cerrar Sesión
        </button>
      </div>
    </div>
  </nav>
} @else {
  <!-- VISITANTES NO LOGUEADOS -->
  <nav class="navbar navbar-expand-lg navbar-dark navbar-guest">
    <div class="container">
      <a class="navbar-brand" href="#">✂ Barbería 11</a>
      <div class="navbar-nav ms-auto">
        <a class="nav-link" routerLink="/login">Login</a>
        <a class="nav-link" routerLink="/formulario">Registro</a>
      </div>
    </div>
  </nav>
}
<main class="main-content">
  <router-outlet />
</main>
