<div class="dashboard-container">
  <div class="dashboard-header mb-4">
    <h2 class="fw-bold"><i class="bi bi-speedometer2 me-2"></i>Panel de Administración</h2>
    <p class="text-muted mb-0">Bienvenido al sistema de gestión de la barbería</p>
  </div>

  <div class="row g-3 mb-4">
    @for (kpi of kpis; track kpi.titulo) {
      <div class="col-6 col-lg-3">
        <div class="card kpi-card h-100" [style.border-left-color]="kpi.color">
          <div class="card-body">
            <div class="d-flex justify-content-between align-items-start">
              <div>
                <p class="kpi-label text-muted mb-1">{{ kpi.titulo }}</p>
                <h3 class="kpi-value fw-bold mb-0" [style.color]="kpi.color">{{ kpi.valor }}</h3>
              </div>
              
            </div>
          </div>
        </div>
      </div>
    }
  </div>

  <div class="row g-3 mb-4">
    <div class="col-12 col-lg-6">
      <div class="card chart-card h-100">
        <div class="card-header bg-white">
          <h6 class="mb-0 fw-semibold"><i class="bi bi-pie-chart me-2"></i>Turnos por Estado</h6>
        </div>
        <div class="card-body">
          <app-turnos-por-estado></app-turnos-por-estado>
        </div>
      </div>
    </div>
    <div class="col-12 col-lg-6">
      <div class="card chart-card h-100">
        <div class="card-header bg-white">
          <h6 class="mb-0 fw-semibold"><i class="bi bi-bar-chart me-2"></i>Ingresos por Día</h6>
        </div>
        <div class="card-body">
          <app-ingresos-por-dia></app-ingresos-por-dia>
        </div>
      </div>
    </div>
  </div>

  <div class="row g-3">
    <div class="col-12">
      <div class="card chart-card">
        <div class="card-header bg-white">
          <h6 class="mb-0 fw-semibold"><i class="bi bi-bar-chart-horizontal me-2"></i>Turnos por Barbero</h6>
        </div>
        <div class="card-body">
          <app-turnos-por-barbero></app-turnos-por-barbero>
        </div>
      </div>
    </div>
  </div>
</div>
