<div class="container py-4">
  <div class="d-flex align-items-center mb-4">
    <button class="btn btn-outline-secondary me-3" routerLink="/admin/usuarios">
      <i class="bi bi-arrow-left"></i> Volver
    </button>
    <h3 class="mb-0">{{ esEdicion ? 'Editar' : 'Crear' }} Usuario</h3>
  </div>

  <div class="card shadow-sm col-md-8 col-lg-6">
    <div class="card-body p-4">
      <form (ngSubmit)="guardar()" #usuarioForm="ngForm">

        <div class="row">
          <div class="col-6 mb-3">
            <label class="form-label fw-bold">Nombre</label>
            <input type="text" class="form-control" name="nombre" [(ngModel)]="usuario.nombre" required placeholder="Ej. Carlos">
          </div>
          <div class="col-6 mb-3">
            <label class="form-label fw-bold">Apellido</label>
            <input type="text" class="form-control" name="apellido" [(ngModel)]="usuario.apellido" required placeholder="Ej. López">
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label fw-bold">Email</label>
          <input type="email" class="form-control" name="email" [(ngModel)]="usuario.email" required placeholder="correo@ejemplo.com">
        </div>

        <div class="mb-3">
          <label class="form-label fw-bold">Contraseña @if (esEdicion) { <small class="text-muted">(dejar vacío para no cambiar)</small> }</label>
          <input type="password" class="form-control" name="password" [(ngModel)]="usuario.password" [required]="!esEdicion" placeholder="••••••••">
        </div>

        <div class="mb-3">
          <label class="form-label fw-bold">Rol</label>
          <select class="form-select" name="rol" [(ngModel)]="usuario.rol">
            <option value="CLIENTE">Cliente</option>
            <option value="BARBERO">Barbero</option>
            <option value="ADMINISTRADOR">Administrador</option>
            <option value="RECEPCIONISTA">Recepcionista</option>
          </select>
        </div>

        <div class="mb-4">
          <div class="form-check form-switch fs-5">
            <input class="form-check-input" type="checkbox" name="activo" id="activoCheck" [(ngModel)]="usuario.activo">
            <label class="form-check-label ms-2" for="activoCheck">Usuario Activo</label>
          </div>
        </div>

        <button type="submit" class="btn btn-primary w-100 fs-5 shadow-sm" [disabled]="!usuarioForm.form.valid || cargando">
          @if (cargando) {
            <span class="spinner-border spinner-border-sm me-2" role="status"></span>Guardando...
          } @else {
            <i class="bi bi-save me-2"></i>Guardar Usuario
          }
        </button>
      </form>
    </div>
  </div>
</div>
