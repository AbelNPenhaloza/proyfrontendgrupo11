<div class="container py-4">
  <div class="d-flex align-items-center mb-4">
    <button class="btn btn-outline-secondary me-3" routerLink="/admin/turnos">
      <i class="bi bi-arrow-left"></i> Volver
    </button>
    <h3 class="mb-0">{{ esEdicion ? 'Editar' : 'Crear' }} Turno</h3>
  </div>

  <div class="card shadow-sm col-md-8 col-lg-6">
    <div class="card-body p-4">
      <form (ngSubmit)="guardar()" #turnoForm="ngForm">
        
        <div class="mb-3">
          <label class="form-label fw-bold">Fecha</label>
          <input type="date" class="form-control" name="fecha" [(ngModel)]="turno.fecha" required>
        </div>

        <div class="row">
          <div class="col-6 mb-3">
            <label class="form-label fw-bold">Hora Inicio</label>
            <input type="time" class="form-control" name="hora_inicio" [(ngModel)]="turno.hora_inicio" required step="1800">
          </div>
          <div class="col-6 mb-3">
            <label class="form-label fw-bold">Hora Fin</label>
            <input type="time" class="form-control" name="hora_fin" [(ngModel)]="turno.hora_fin" required step="1800">
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label fw-bold">Estado</label>
          <select class="form-select" name="estado" [(ngModel)]="turno.estado">
            <option value="PENDIENTE">Pendiente</option>
            <option value="CONFIRMADO">Confirmado</option>
            <option value="ATENDIDO">Atendido</option>
            <option value="CANCELADO">Cancelado</option>
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label fw-bold text-muted">ID Cliente (UUID)</label>
          <input type="text" class="form-control" name="cliente_id" [(ngModel)]="turno.cliente_id" required>
        </div>
        
        <div class="mb-3">
          <label class="form-label fw-bold text-muted">ID Barbero (UUID)</label>
          <input type="text" class="form-control" name="barbero_id" [(ngModel)]="turno.barbero_id" required>
        </div>

        <div class="mb-3">
          <label class="form-label fw-bold text-muted">ID Servicio (UUID)</label>
          <input type="text" class="form-control" name="servicio_id" [(ngModel)]="turno.servicio_id" required>
        </div>

        <div class="mb-4">
          <label class="form-label fw-bold">Notas del turno</label>
          <textarea class="form-control" name="notas" [(ngModel)]="turno.notas" rows="2" placeholder="Ej. El cliente pidió que lo atienda Carlos exclusivamente"></textarea>
        </div>

        <button type="submit" class="btn btn-primary w-100 fs-5 shadow-sm" [disabled]="!turnoForm.form.valid || cargando">
          @if (cargando) {
            <span class="spinner-border spinner-border-sm me-2" role="status"></span>Guardando...
          } @else {
            <i class="bi bi-save me-2"></i>Guardar Turno
          }
        </button>
      </form>
    </div>
  </div>
</div>
