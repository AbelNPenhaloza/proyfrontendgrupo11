<div class="table-container">
  <div class="d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center gap-2 mb-3">
    <div class="d-flex align-items-center gap-2">
      <h4 class="fw-bold mb-0"><i class="bi bi-person-badge me-2"></i>Barberos</h4>
      <button class="btn btn-primary btn-sm" routerLink="/admin/barberos/crear">
        <i class="bi bi-plus-circle me-1"></i>Crear Barbero
      </button>
    </div>
    <div class="export-buttons">
      <button class="btn btn-danger btn-sm" (click)="exportPdf()">
        <i class="bi bi-file-earmark-pdf me-1"></i>PDF
      </button>
      <button class="btn btn-success btn-sm ms-1" (click)="exportExcel()">
        <i class="bi bi-file-earmark-excel me-1"></i>Excel
      </button>
    </div>
  </div>

  @if (!cargando) {
    <div class="table-responsive">
      <table id="barberosTable" class="table table-striped table-hover">
        <thead class="table-dark">
          <tr>
            <th>Nombre</th>
            <th>Especialidad</th>
            <th>Activo</th>
            <th class="acciones-col">Acciones</th>
          </tr>
        </thead>
        <tbody>
          @for (barbero of barberos; track barbero.barbero_id) {
            <tr>
              <td class="fw-semibold">{{ barbero.nombre_completo }}</td>
              <td><span [class]="getBadgeEspecialidad(barbero.especialidad)">{{ barbero.especialidad }}</span></td>
              <td>
                @if (barbero.activo) {
                  <span class="badge bg-success">Activo</span>
                } @else {
                  <span class="badge bg-secondary">Inactivo</span>
                }
              </td>
              <td class="acciones-cell">
                <button class="btn btn-outline-primary btn-sm" title="Editar" (click)="editarBarbero(barbero)">
                  <i class="bi bi-pencil"></i>
                </button>
                <button class="btn btn-outline-danger btn-sm ms-1" title="Eliminar" (click)="eliminarBarbero(barbero)">
                  <i class="bi bi-trash"></i>
                </button>
              </td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  } @else {
    <div class="text-center py-5">
      <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">Cargando...</span>
      </div>
      <p class="text-muted mt-2 mb-0">Cargando listado de barberos...</p>
    </div>
  }
</div>
