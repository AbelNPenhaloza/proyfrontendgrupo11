<div class="container py-4">
  <div class="d-flex align-items-center mb-4">
    <button class="btn btn-outline-secondary me-3" routerLink="/admin/barberos">
      <i class="bi bi-arrow-left"></i> Volver
    </button>
    <h3 class="mb-0">{{ esEdicion ? 'Editar' : 'Crear' }} Barbero</h3>
  </div>

  <div class="card shadow-sm col-md-8 col-lg-6">
    <div class="card-body p-4">
      <form (ngSubmit)="guardar()" #barberoForm="ngForm">
        
        <div class="mb-3">
          <label class="form-label fw-bold">Nombre Completo</label>
          <input type="text" class="form-control" name="nombre_completo" [(ngModel)]="barbero.nombre_completo" required placeholder="Ej. Carlos López">
        </div>

        @if (!esEdicion) {
          <div class="mb-3">
            <label class="form-label fw-bold">Email de Acceso</label>
            <input type="email" class="form-control" name="email" [(ngModel)]="barbero.email" required placeholder="barbero@barberia.com">
          </div>
  
          <div class="mb-3">
            <label class="form-label fw-bold">Contraseña</label>
            <input type="password" class="form-control" name="password" [(ngModel)]="barbero.password" required placeholder="Minimo 6 caracteres">
          </div>
        }

        <div class="mb-3">
          <label class="form-label fw-bold">Especialidad Principal</label>
          <select class="form-select" name="especialidad" [(ngModel)]="barbero.especialidad">
            <option value="CLASICO">Corte Clásico</option>
            <option value="DEGRADADOS">Fade / Degradados</option>
            <option value="BARBA">Estilista de Barba</option>
            <option value="COLORISTA">Colorista</option>
          </select>
        </div>

        <div class="mb-4">
          <div class="form-check form-switch fs-5">
            <input class="form-check-input" type="checkbox" name="activo" id="activoCheck" [(ngModel)]="barbero.activo">
            <label class="form-check-label ms-2" for="activoCheck">Barbero Activo (visible para reservas)</label>
          </div>
        </div>

        <button type="submit" class="btn btn-primary w-100 fs-5 shadow-sm" [disabled]="!barberoForm.form.valid || cargando">
          @if (cargando) {
            <span class="spinner-border spinner-border-sm me-2" role="status"></span>Guardando...
          } @else {
            <i class="bi bi-save me-2"></i>Guardar Barbero
          }
        </button>
      </form>
    </div>
  </div>
</div>
