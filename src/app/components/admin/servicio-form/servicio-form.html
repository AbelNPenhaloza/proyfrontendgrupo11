<div class="container py-4">
  <div class="d-flex align-items-center mb-4">
    <button class="btn btn-outline-secondary me-3" routerLink="/admin/servicios">
      <i class="bi bi-arrow-left"></i> Volver
    </button>
    <h3 class="mb-0">{{ esEdicion ? 'Editar' : 'Crear' }} Servicio</h3>
  </div>

  <div class="card shadow-sm col-md-8 col-lg-6">
    <div class="card-body p-4">
      <form (ngSubmit)="guardar()" #servicioForm="ngForm">

        <div class="mb-3">
          <label class="form-label fw-bold">Nombre del Servicio</label>
          <input type="text" class="form-control" name="nombre" [(ngModel)]="servicio.nombre" required placeholder="Ej. Corte de pelo">
        </div>

        <div class="mb-3">
          <label class="form-label fw-bold">Descripción</label>
          <textarea class="form-control" name="descripcion" [(ngModel)]="servicio.descripcion" rows="3" placeholder="Breve descripción del servicio..."></textarea>
        </div>

        <div class="row">
          <div class="col-6 mb-3">
            <label class="form-label fw-bold">Duración (minutos)</label>
            <input type="number" class="form-control" name="duracion_minutos" [(ngModel)]="servicio.duracion_minutos" required min="10" step="5">
          </div>
          <div class="col-6 mb-3">
            <label class="form-label fw-bold">Precio ($)</label>
            <input type="number" class="form-control" name="precio" [(ngModel)]="servicio.precio" required min="0" step="100">
          </div>
        </div>

        <div class="mb-4">
          <div class="form-check form-switch fs-5">
            <input class="form-check-input" type="checkbox" name="activo" id="activoCheck" [(ngModel)]="servicio.activo">
            <label class="form-check-label ms-2" for="activoCheck">Servicio Activo (visible para clientes)</label>
          </div>
        </div>

        <button type="submit" class="btn btn-primary w-100 fs-5 shadow-sm" [disabled]="!servicioForm.form.valid || cargando">
          @if (cargando) {
            <span class="spinner-border spinner-border-sm me-2" role="status"></span>Guardando...
          } @else {
            <i class="bi bi-save me-2"></i>Guardar Servicio
          }
        </button>
      </form>
    </div>
  </div>
</div>
