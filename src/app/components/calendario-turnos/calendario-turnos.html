<div class="container my-5 animate__animated animate__fadeIn">
  <div class="card shadow-lg border-0 rounded-4 overflow-hidden">
    
    <div class="p-4 text-white text-center" style="background-color: #14213D;">
      <h3 class="fw-bold mb-1"><i class="fa-solid fa-calendar-days me-2"></i>Reserva tu Turno</h3>
      <p class="mb-0 opacity-75">Seleccioná el día que te quede más cómodo</p>
    </div>

    <div class="card-body p-3 p-md-4 bg-white text-dark">
      <full-calendar [options]="calendarOptions"></full-calendar>
    </div>

  </div>
</div>
